version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: de_hometask_postgres
    environment:
      POSTGRES_USER: vasko_user
      POSTGRES_PASSWORD: vasko_password
      POSTGRES_DB: vasko_shop_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: